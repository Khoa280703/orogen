version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-duanai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-duanai}
      POSTGRES_DB: ${POSTGRES_DB:-duanai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-duanai}']
      interval: 10s
      timeout: 5s
      retries: 5

  grok-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-duanai}:${POSTGRES_PASSWORD:-duanai}@postgres:5432/${POSTGRES_DB:-duanai}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - GROK_API_KEY=${GROK_API_KEY}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - grok-api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - grok-api
      - web
    restart: unless-stopped

volumes:
  postgres_data:
