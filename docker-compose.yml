version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: grok_local_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: grok_local
      POSTGRES_USER: grok
      POSTGRES_PASSWORD: grokpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grok -d grok_local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
